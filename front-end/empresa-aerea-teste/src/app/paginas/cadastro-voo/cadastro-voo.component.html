<div class="container">
    <h2>Cadastro de Voo</h2>
  
    <form (ngSubmit)="cadastrarVoo()">
      <div class="form-group">
        <label for="codigoVoo">Código do Voo (TADS0000):</label>
        <input type="text" id="codigoVoo" class="form-control" placeholder="Digite o código do voo" required>
      </div>
  
      <div class="form-group">
        <label for="dataHora">Data/Hora:</label>
        <input type="datetime-local" id="dataHora" class="form-control" required>
      </div>
  
      <div class="form-group">
        <label for="origem">Aeroporto Origem:</label>
        <input type="text" id="origem" class="form-control" placeholder="Digite o aeroporto de origem" required>
      </div>
  
      <div class="form-group">
        <label for="destino">Aeroporto Destino:</label>
        <input type="text" id="destino" class="form-control" placeholder="Digite o aeroporto de destino" required>
      </div>
  
      <div class="form-group">
        <label for="valorPassagem">Valor da Passagem (em reais):</label>
        <input type="number" id="valorPassagem" class="form-control" placeholder="Digite o valor da passagem" required>
        <small>Equivalente em milhas: {{ calcularMilhas(valorPassagem) }}</small>
      </div>
  
      <div class="form-group">
        <label for="quantidadePoltronas">Quantidade de Poltronas:</label>
        <input type="number" id="quantidadePoltronas" class="form-control" placeholder="Digite a quantidade de poltronas" required>
      </div>
  
      <button type="submit" class="btn btn-primary">Cadastrar Voo</button>
    </form>
  </div>
